<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Principle Escape Room</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-header { text-align: center; margin-bottom: 20px; }
        .menu-header h1 { font-size: 3rem; color: #2c3e50; margin-bottom: 10px; }
        body.dark-mode .menu-header h1 { color: #f4f4f9; }
        .menu-header p { font-size: 1.2rem; color: #7f8c8d; }
        .level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; border-top: 2px solid #eee; padding-top: 30px; }
        body.dark-mode .level-grid { border-color: #444; }
        
        .btn-start { background-color: #e74c3c; color: white; font-size: 1.5rem; width: 100%; padding: 20px; text-transform: uppercase; letter-spacing: 2px; animation: pulse 2s infinite; }
        .btn-start:hover { background-color: #c0392b; transform: scale(1.02); }
        .btn-level { background-color: #ecf0f1; color: #333; border: 1px solid #bdc3c7; }
        body.dark-mode .btn-level { background-color: #333; color: #eee; border-color: #555; }
        .btn-level:hover { background-color: #bdc3c7; color: #2c3e50; }

        /* Ensure the main content sits ABOVE the animated background */
        #page-wrapper { z-index: 10; position: relative; }
        #dark-mode-toggle { z-index: 20; }
    </style>
</head>
<body class="centered-layout">

    <ul class="bg-shapes">
        <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> </ul>

    <button id="dark-mode-toggle">🌙 Dark Mode</button>

    <main id="page-wrapper">
        <div class="room-container" style="max-width: 600px;">
            
            <div class="menu-header">
                <h1>The Design Escape</h1>
                <p>Module: Design Ideation Interactive Assessment</p>
            </div>

            <p style="text-align: center; margin-bottom: 30px; line-height: 1.6;">
                Welcome to the Design Principle Escape Room. To unlock the doors and escape, you must prove your understanding of fundamental design theories by fixing broken layouts, restoring typography, and balancing visual weight.
            </p>

            <button class="btn btn-start" onclick="window.location.href='level1.html'">Start Escape Room</button>

            <div class="level-grid">
                <button class="btn btn-level" onclick="window.location.href='level1.html'">Level 1: Balance</button>
                <button class="btn btn-level" onclick="window.location.href='level2.html'">Level 2: Contrast</button>
                <button class="btn btn-level" onclick="window.location.href='level3.html'">Level 3: Proximity</button>
                <button class="btn btn-level" onclick="window.location.href='level4.html'">Level 4: Typography</button>
                <button class="btn btn-level" onclick="window.location.href='level5.html'" style="grid-column: 1 / -1; background-color: #9b59b6; color: white; border: none;">Level 5: Grand Finale Layout</button>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
