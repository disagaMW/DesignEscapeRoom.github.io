<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room - Level 1: Balance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="centered-layout">

   <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <ul class="bg-shapes">
        <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> </ul>

    <header class="global-header">
        <a href="menu.html" class="logo">🎨 The Design Escape</a>
        <nav class="global-nav">
            <a href="menu.html">Menu</a>
            <a href="level1.html">L1</a>
            <a href="level2.html">L2</a>
            <a href="level3.html">L3</a>
            <a href="level4.html">L4</a>
            <a href="level5.html">L5</a>
            <button id="dark-mode-toggle">🌙 Dark Mode</button>
            <button id="logout-btn">🚪 Log Out</button>
        </nav>
    </header>

    <main id="page-wrapper">
        <div class="instructions">
            <h1>Level 1: The Tilted Room</h1>
            <p>This layout feels heavy on one side. Restore the <strong>Balance</strong> to unlock the door.</p>
        </div>

        <div class="room-container">
            <div class="scale">
                <div class="weight" id="visual-weight"></div>
            </div>
            
            <div class="controls">
                <input type="range" id="balance-slider" min="0" max="100" value="0">
            </div>

            <div style="text-align: center;">
                <button id="next-btn" onclick="goToLevel2()" disabled>Proceed to Level 2</button>
            </div>
        </div>
    </main>

    <footer class="global-footer">
        Design Ideation Module Final Project | University of Kelaniya
    </footer>

    <script src="script.js"></script>
</body>
</html>
