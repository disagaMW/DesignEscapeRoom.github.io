<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room - Level 2: Contrast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="centered-layout">

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <ul class="bg-shapes">
        <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> <li></li> </ul>

    <header class="global-header">
        <a href="menu.html" class="logo">🎨 The Design Escape</a>
        <nav class="global-nav">
            <a href="menu.html">Menu</a>
            <a href="level1.html">L1</a>
            <a href="level2.html">L2</a>
            <a href="level3.html">L3</a>
            <a href="level4.html">L4</a>
            <a href="level5.html">L5</a>
            <button id="dark-mode-toggle">🌙 Dark Mode</button>
            <button id="logout-btn">🚪 Log Out</button>
        </nav>
    </header>

    <main id="page-wrapper">
        <div class="instructions">
            <h1>Level 2: The Camouflage</h1>
            <p>Something is hidden in plain sight. Use the color wheel to create <strong>Contrast</strong> and reveal the key.</p>
        </div>

        <div class="room-container">
            
            <div class="color-canvas" id="canvas">
                <div class="hidden-shape" id="key-shape"></div>
            </div>
            
            <div class="controls">
                <p>Adjust Background Hue</p>
                <input type="range" id="hue-slider" min="0" max="360" value="10">
            </div>

            <div style="text-align: center;">
                <button id="next-btn" onclick="goToLevel3()" disabled>Proceed to Level 3</button>
            </div>
        </div>
    </main>

    <footer class="global-footer">
        Design Ideation Module Final Project | University of Kelaniya
    </footer>

    <script src="script.js"></script>
</body>
</html>
